<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Wish</title>

<style>
body {
margin: 0;
font-family: Arial;
background: radial-gradient(circle at top, #1a2a3a, #0b0f1a);
height: 100vh;
overflow: hidden;
}

.stars {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
}

.star {
position: absolute;
top: -10px;
width: 4px;
height: 4px;
background: white;
border-radius: 50%;
box-shadow: 0 0 10px white, 0 0 20px gold;
animation: fall linear infinite, twinkle 1.5s infinite ease-in-out;
}

@keyframes fall {
0% { transform: translateY(-10vh); opacity: 0; }
10% { opacity: 1; }
100% { transform: translateY(110vh); opacity: 0; }
}

@keyframes twinkle {
0% { opacity: 0.3; }
100% { opacity: 1; }
}

.main {
text-align: center;
color: white;
}

.moon {
position: fixed;
top: 25px;
right: 25px;
width: 95px;
height: 95px;
background: gold;
border-radius: 50%;
box-shadow: 0 0 15px gold;
overflow: hidden;
animation: moonGlow 3s infinite ease-in-out;
}

.moon::after {
content: "";
position: absolute;
top: 0;
left: 28px;
width: 95px;
height: 95px;
background: #0b0f1a;
border-radius: 50%;
}

@keyframes moonGlow {
0% { transform: scale(1); box-shadow: 0 0 10px gold; }
50% { transform: scale(1.08); box-shadow: 0 0 30px gold; }
100% { transform: scale(1); box-shadow: 0 0 10px gold; }
}

.card {
margin-top: 120px;
display: inline-block;
padding: 25px;
background: rgba(255,255,255,0.08);
border-radius: 20px;
backdrop-filter: blur(10px);
}

h1 {
color: gold;
text-shadow: 0 0 15px gold;
}

h3 {
color: #ffd700;
text-shadow: 0 0 10px gold;
}

img {
width: 220px;
height: 220px;
border-radius: 50%;
border: 5px solid gold;
object-fit: cover;
}

#welcomeMsg {
margin-top: 15px;
color: gold;
font-size: 15px;
text-shadow: 0 0 10px gold;
line-height: 1.6;
}

/* SIGNATURE */
.signature {
position: fixed;
bottom: 15px;
width: 100%;
text-align: center;
color: rgba(255, 215, 0, 0.8);
font-size: 13px;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="main">

<div class="moon"></div>

<div class="card">
<h1>EID MUBARAK 🌙</h1>

<h3 id="nameTitle">Someone Special</h3>

<img id="userImage" src="https://i.imgur.com/jqn0ePo.jpeg">

<div id="welcomeMsg">
Wishing you a blessed Eid filled with peace, happiness, and prosperity.  
May this special occasion bring joy to your heart and success to your life.  
Stay blessed and keep smiling always.
</div>
</div>
</div>

<div class="signature">
from Tahsin-Jawad
</div>

<script>

const params = new URLSearchParams(window.location.search);

let name = params.get("name") || "Someone Special";
let img = params.get("img") || "https://i.imgur.com/jqn0ePo.jpeg";

document.getElementById("nameTitle").innerText = name;
document.getElementById("userImage").src = img;

function createStars() {
const container = document.querySelector(".stars");

for (let i = 0; i < 60; i++) {
let star = document.createElement("div");
star.classList.add("star");

star.style.left = Math.random() * 100 + "vw";
star.style.animationDuration = (2 + Math.random() * 3) + "s";
star.style.animationDelay = Math.random() * 5 + "s";

container.appendChild(star);
}
}

createStars();

</script>

</body>
</html>
