<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Eid Wish</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a2a3a, #0b0f1a);
  height: 100vh;
  overflow: hidden;
  text-align: center;
  color: white;
}

/* ⭐ STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
}

.star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white, 0 0 20px gold;
  animation: fall linear infinite, twinkle 1.5s infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 0; }
  100% { transform: translateY(110vh); opacity: 0; }
}

@keyframes twinkle {
  0% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* 🌙 MOON */
.moon {
  position: fixed;
  top: 25px;
  right: 25px;
  width: 95px;
  height: 95px;
  background: gold;
  border-radius: 50%;
  box-shadow: 0 0 15px gold;
  overflow: hidden;
  animation: moonGlow 3s infinite;
}

.moon::after {
  content: "";
  position: absolute;
  left: 28px;
  width: 95px;
  height: 95px;
  background: #0b0f1a;
  border-radius: 50%;
}

@keyframes moonGlow {
  0% { box-shadow: 0 0 10px gold; }
  50% { box-shadow: 0 0 30px gold; }
  100% { box-shadow: 0 0 10px gold; }
}

/* LOGIN */
.login-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

input {
  padding: 10px;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: gold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* STEP CONTENT */
.step {
  display: none;
  margin-top: 120px;
}

img {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 5px solid gold;
  object-fit: cover;
}

.text {
  margin-top: 15px;
  color: gold;
  text-shadow: 0 0 10px gold;
  padding: 0 20px;
}

.next-btn {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="moon"></div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>Enter Password 🔐</h2>
  <input type="password" id="pass">
  <br>
  <button onclick="checkPass()">Open</button>
</div>

<!-- STEP 1 -->
<div class="step" id="step1">
  <img src="https://i.imgur.com/NLGnU3f.jpeg">
  <div class="text">
    You are the moon that lights up every moment. Keep glowing softly, and may your light grow endlessly.
  </div>
  <button class="next-btn" onclick="nextStep(2)">Next ➜</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <img src="https://i.imgur.com/fTApXHV.jpeg">
  <div class="text">
    Jawad ja ja bole, listen to these words. Hearing these makes you feel more sweeter.
  </div>
  <button class="next-btn" onclick="nextStep(3)">Next ➜</button>
</div>

<!-- STEP 3 FINAL -->
<div class="step" id="step3">
  <img src="https://i.imgur.com/MJ18dc4.jpeg">
  <h1 style="color: gold; text-shadow: 0 0 15px gold;">Eid Mubarak 🌙</h1>
  <h3 style="color: gold;">Cutie Pie</h3>
</div>

<script>
function checkPass() {
  let password = document.getElementById("pass").value;

  if(password === "IamCutie") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("step1").style.display = "block";
  } else {
    alert("Wrong Password ❌");
  }
}

function nextStep(step) {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "none";

  document.getElementById("step" + step).style.display = "block";
}

/* STARS */
function createStars() {
  const container = document.querySelector(".stars");
  for (let i = 0; i < 60; i++) {
    let star = document.createElement("div");
    star.classList.add("star");
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = (2 + Math.random() * 3) + "s";
    container.appendChild(star);
  }
}
createStars();
</script>

</body>
</html>
