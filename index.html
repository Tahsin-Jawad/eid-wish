<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Wish</title>

<style>
body {
margin: 0;
font-family: Arial;
background: radial-gradient(circle at top, #2b1055, #000000);
height: 100vh;
overflow: hidden;
color: white;
}

/* STARS */
.stars {
position: fixed;
width: 100%;
height: 100%;
pointer-events: none;
}

.star {
position: absolute;
top: -10px;
width: 3px;
height: 3px;
background: #ffffff;
border-radius: 50%;
box-shadow: 0 0 8px #fff, 0 0 15px #a855f7;
animation: fall linear infinite, twinkle 1.5s infinite ease-in-out;
}

@keyframes fall {
0% { transform: translateY(-10vh); opacity: 0; }
10% { opacity: 1; }
100% { transform: translateY(110vh); opacity: 0; }
}

@keyframes twinkle {
0% { opacity: 0.3; }
100% { opacity: 1; }
}

/* MOON */
.moon {
position: fixed;
top: 30px;
right: 30px;
width: 90px;
height: 90px;
background: #c084fc;
border-radius: 50%;
box-shadow: 0 0 25px #a855f7;
animation: glowMoon 3s infinite ease-in-out;
}

@keyframes glowMoon {
0% { transform: scale(1); box-shadow: 0 0 15px #a855f7; }
50% { transform: scale(1.1); box-shadow: 0 0 35px #c084fc; }
100% { transform: scale(1); box-shadow: 0 0 15px #a855f7; }
}

/* CARD */
.card {
margin-top: 120px;
display: inline-block;
padding: 30px;
background: rgba(255,255,255,0.06);
border-radius: 25px;
backdrop-filter: blur(12px);
box-shadow: 0 0 25px rgba(168,85,247,0.2);
animation: floatCard 4s ease-in-out infinite;
}

@keyframes floatCard {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}

h1 {
color: #c084fc;
text-shadow: 0 0 15px #a855f7;
}

h3 {
color: #e9d5ff;
text-shadow: 0 0 10px #a855f7;
}

img {
width: 220px;
height: 220px;
border-radius: 50%;
border: 4px solid #c084fc;
object-fit: cover;
box-shadow: 0 0 20px #a855f7;
}

#welcomeMsg {
margin-top: 15px;
font-size: 15px;
line-height: 1.6;
color: #f5f3ff;
animation: fadeText 2s infinite alternate;
}

@keyframes fadeText {
from { opacity: 0.6; }
to { opacity: 1; }
}

/* SIGNATURE */
.signature {
position: fixed;
bottom: 15px;
width: 100%;
text-align: center;
font-size: 13px;
color: #a855f7;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="moon"></div>

<div class="card">
<h1>EID MUBARAK 🌙</h1>

<h3 id="nameTitle">Someone Special</h3>

<img id="userImage" src="https://i.imgur.com/jqn0ePo.jpeg">

<div id="welcomeMsg">
Wishing you a blessed Eid filled with peace, happiness, and prosperity.  
May your days be filled with light, success, and endless joy.
</div>
</div>

<div class="signature">
from Tahsin-Jawad
</div>

<script>

/* LINK DATA */
const params = new URLSearchParams(window.location.search);

let name = params.get("name") || "Someone Special";
let img = params.get("img") || "https://i.imgur.com/jqn0ePo.jpeg";

document.getElementById("nameTitle").innerText = name;
document.getElementById("userImage").src = img;

/* STARS */
function createStars() {
const container = document.querySelector(".stars");

for (let i = 0; i < 70; i++) {
let star = document.createElement("div");
star.classList.add("star");

star.style.left = Math.random() * 100 + "vw";
star.style.animationDuration = (2 + Math.random() * 3) + "s";
star.style.animationDelay = Math.random() * 5 + "s";

container.appendChild(star);
}
}

createStars();

</script>

</body>
</html>
